<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据监察看板</title>
    <!-- 引入Excel解析和图表库 -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "微软雅黑", sans-serif;
        }

        body {
            background-color: #f5f7fa;
            color: #333;
            padding: 20px;
            line-height: 1.5;
        }

        /* 头部样式 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 20px;
            color: #1f2937;
            font-weight: 600;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        /* 按钮通用样式 */
        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .night-mode {
            background-color: #f3f4f6;
            color: #333;
            border: 1px solid #d1d5db;
        }

        .night-mode:hover {
            background-color: #e5e7eb;
        }

        .load-data {
            background-color: #2563eb;
            color: #ffffff;
        }

        .load-data:hover {
            background-color: #1d4ed8;
        }

        /* 筛选器样式 */
        .filter-box {
            background-color: #ffffff;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            margin-bottom: 20px;
        }

        .filter-row {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .filter-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-item label {
            font-size: 14px;
            color: #4b5563;
            font-weight: 500;
        }

        .filter-item select, .filter-item input {
            padding: 8px 12px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            font-size: 14px;
            min-width: 120px;
        }

        .filter-item input {
            min-width: 150px;
        }

        .reset-filter {
            background-color: #2563eb;
            color: #ffffff;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-left: 10px;
        }

        .reset-filter:hover {
            background-color: #1d4ed8;
        }

        /* 内容模块样式 */
        .content-box {
            background-color: #ffffff;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            margin-bottom: 20px;
        }

        .content-box h3 {
            font-size: 16px;
            color: #1f2937;
            margin-bottom: 16px;
            font-weight: 600;
        }

        .desc {
            font-size: 12px;
            color: #6b7280;
            text-align: center;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        /* 表格样式 */
        .table-box {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            min-width: 600px;
        }

        th, td {
            border: 1px solid #e5e7eb;
            padding: 10px 12px;
            text-align: left;
        }

        th {
            background-color: #f9fafb;
            color: #374151;
            font-weight: 600;
        }

        tr:hover {
            background-color: #f9fafb;
        }

        /* 加载状态样式 */
        .loading {
            text-align: center;
            padding: 30px;
            color: #6b7280;
            font-size: 14px;
        }

        /* 重置筛选链接 */
        .reset-btn {
            text-align: center;
            margin-top: 16px;
        }

        .reset-btn a {
            color: #f59e0b;
            text-decoration: none;
            font-size: 12px;
            cursor: pointer;
        }

        .reset-btn a:hover {
            text-decoration: underline;
        }

        /* 指标卡片样式 */
        .indicator-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            text-align: center;
            padding: 20px;
            background-color: #f9fafb;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
        }

        .card .label {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 8px;
        }

        .card .value {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .card .total-check {
            color: #2563eb;
        }

        .card .total-diff {
            color: #ef4444;
        }

        .card .diff-rate {
            color: #f59e0b;
        }

        .card .objective-rate {
            color: #10b981;
        }
    </style>
</head>
<body>
    <!-- 头部区域 -->
    <div class="header">
        <h1>📊 数据监察看板</h1>
        <div class="btn-group">
            <button class="btn night-mode">🌙 夜间模式</button>
            <!-- 核心按钮：加载远程Excel数据 -->
            <button class="btn load-data" onclick="loadRemoteData()">📤 加载最新数据</button>
        </div>
    </div>

    <!-- 筛选器区域 -->
    <div class="filter-box">
        <div class="filter-row">
            <div class="filter-item">
                <label>🏬 中心仓</label>
                <select id="centerWarehouse">
                    <option value="all">全部中心仓</option>
                </select>
            </div>
            <div class="filter-item">
                <label>🔍 质检人员关键字</label>
                <input type="text" id="qcKeyword" placeholder="输入姓名关键字筛选">
            </div>
            <div class="filter-item">
                <label>👤 质检人员</label>
                <select id="qcPerson">
                    <option value="all">全部质检人员</option>
                </select>
            </div>
            <div class="filter-item">
                <label>🔴 主客观项</label>
                <select id="subjectiveType">
                    <option value="all">全部</option>
                    <option value="主观">主观</option>
                    <option value="客观">客观</option>
                </select>
            </div>
            <div class="filter-item">
                <label>⚠️ 问题类型</label>
                <select id="problemType">
                    <option value="all">全部问题类型</option>
                </select>
            </div>
            <div class="filter-item">
                <label>🔴 抽检判定类型</label>
                <select id="judgeType">
                    <option value="all">全部</option>
                </select>
            </div>
            <button class="reset-filter" onclick="resetFilter()">🔄 重置筛选</button>
        </div>
    </div>

    <!-- 抽检指标详情 -->
    <div class="content-box">
        <h3>📋 抽检指标详情（QA抽检差异数据 & 客观执行差异率）</h3>
        <p class="desc">※ 抽检差异率、客观/主观差异率基于"周汇总表"；客观执行抽检差异率基于"差异明细表"；客观问题且抽检判定类型为"执行问题"的去重设备数/抽检总量。</p>
        <div id="indicatorData" class="loading">请点击右上角「加载最新数据」按钮获取仓库中的最新数据</div>
    </div>

    <!-- 中心仓排名 -->
    <div class="content-box">
        <h3>📈 可视化洞察 · 中心仓客观执行差异率排行</h3>
        <div class="table-box">
            <table id="rankTable">
                <thead>
                    <tr>
                        <th>排名</th>
                        <th>站点名称/中心仓</th>
                        <th>客观抽检差异率</th>
                        <th>差异数量</th>
                        <th>抽检总量</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="5" class="loading">等待加载数据...</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="reset-btn">
            <a onclick="resetFilter()">🔄 点击此处 重置筛选</a>
        </div>
    </div>

    <script>
        // ========== 核心配置：你的GitHub仓库文件地址 ==========
        // 必须和你上传的Excel文件名完全一致
        const SUMMARY_EXCEL_URL = "https://raw.githubusercontent.com/vip-rui/-/main/周汇总表.xlsx";
        const DIFF_EXCEL_URL = "https://raw.githubusercontent.com/vip-rui/-/main/差异明细表.xlsx";

        // 全局数据存储
        let globalSummaryData = []; // 周汇总表数据
        let globalDiffData = [];    // 差异明细表数据

        // ========== 核心功能：加载远程Excel数据 ==========
        async function loadRemoteData() {
            // 显示加载状态
            updateLoadingState(true);

            try {
                // 1. 下载并解析周汇总表
                const summaryResponse = await fetch(SUMMARY_EXCEL_URL);
                if (!summaryResponse.ok) throw new Error("周汇总表文件访问失败（404/权限问题）");
                const summaryBlob = await summaryResponse.blob();
                const summaryWorkbook = await readExcelFile(summaryBlob);
                globalSummaryData = XLSX.utils.sheet_to_json(summaryWorkbook.Sheets[summaryWorkbook.SheetNames[0]]);

                // 2. 下载并解析差异明细表
                const diffResponse = await fetch(DIFF_EXCEL_URL);
                if (!diffResponse.ok) throw new Error("差异明细表文件访问失败（404/权限问题）");
                const diffBlob = await diffResponse.blob();
                const diffWorkbook = await readExcelFile(diffBlob);
                globalDiffData = XLSX.utils.sheet_to_json(diffWorkbook.Sheets[diffWorkbook.SheetNames[0]]);

                // 3. 渲染所有数据和筛选器
                renderAllData();
                fillFilterOptions();
                
                // 提示加载成功
                alert("✅ 数据加载成功！已获取仓库中的最新Excel数据");

            } catch (error) {
                // 显示错误信息
                updateLoadingState(false, error.message);
                console.error("加载数据出错：", error);
            }
        }

        // ========== 辅助函数：读取Excel文件 ==========
        function readExcelFile(blob) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        resolve(workbook);
                    } catch (err) {
                        reject(new Error("Excel文件格式错误，请检查文件是否为.xlsx格式"));
                    }
                };
                reader.onerror = () => reject(new Error("文件读取失败"));
                reader.readAsArrayBuffer(blob);
            });
        }

        // ========== 辅助函数：更新加载状态 ==========
        function updateLoadingState(isLoading, errorMsg = "") {
            const indicatorContainer = document.getElementById("indicatorData");
            const tableBody = document.querySelector("#rankTable tbody");

            if (isLoading) {
                indicatorContainer.innerHTML = "<div class='loading'>🚀 正在从仓库加载最新数据，请稍候...</div>";
                tableBody.innerHTML = "<tr><td colspan='5' class='loading'>🚀 正在从仓库加载最新数据，请稍候...</td></tr>";
            } else if (errorMsg) {
                indicatorContainer.innerHTML = `<div class='loading' style='color: #ef4444;'>❌ 加载失败：${errorMsg}</div>`;
                tableBody.innerHTML = `<tr><td colspan='5' class='loading' style='color: #ef4444;'>❌ 加载失败：${errorMsg}</td></tr>`;
            } else {
                indicatorContainer.innerHTML = "<div class='loading'>请点击右上角「加载最新数据」按钮</div>";
                tableBody.innerHTML = "<tr><td colspan='5' class='loading'>等待加载数据...</td></tr>";
            }
        }

        // ========== 核心功能：渲染所有数据 ==========
        function renderAllData() {
            // 渲染抽检指标
            renderIndicatorCards();
            // 渲染排名表格
            renderRankTable();
        }

        // ========== 渲染抽检指标卡片 ==========
        function renderIndicatorCards() {
            if (globalSummaryData.length === 0) {
                document.getElementById("indicatorData").innerHTML = "<div class='loading'>📭 暂无抽检指标数据</div>";
                return;
            }

            // 计算核心指标
            const totalCheck = calculateTotal(globalSummaryData, ['抽检总量', '总单量']);
            const totalDiff = calculateTotal(globalSummaryData, ['差异数量', '差异单量']);
            const objectiveDiff = calculateTotal(globalSummaryData, ['客观差异数']);
            const subjectiveDiff = calculateTotal(globalSummaryData, ['主观差异数']);

            // 计算比率（避免除以0）
            const diffRate = totalCheck > 0 ? ((totalDiff / totalCheck) * 100).toFixed(2) : 0;
            const objectiveRate = totalCheck > 0 ? ((objectiveDiff / totalCheck) * 100).toFixed(2) : 0;
            const subjectiveRate = totalCheck > 0 ? ((subjectiveDiff / totalCheck) * 100).toFixed(2) : 0;

            // 渲染指标卡片
            const indicatorHtml = `
                <div class="indicator-cards">
                    <div class="card">
                        <div class="label">总抽检量</div>
                        <div class="value total-check">${totalCheck}</div>
                    </div>
                    <div class="card">
                        <div class="label">总差异数</div>
                        <div class="value total-diff">${totalDiff}</div>
                    </div>
                    <div class="card">
                        <div class="label">总体差异率</div>
                        <div class="value diff-rate">${diffRate}%</div>
                    </div>
                    <div class="card">
                        <div class="label">客观差异率</div>
                        <div class="value objective-rate">${objectiveRate}%</div>
                    </div>
                    <div class="card">
                        <div class="label">主观差异率</div>
                        <div class="value diff-rate">${subjectiveRate}%</div>
                    </div>
                </div>
            `;

            document.getElementById("indicatorData").innerHTML = indicatorHtml;
        }

        // ========== 渲染中心仓排名表格 ==========
        function renderRankTable() {
            if (globalSummaryData.length === 0) {
                document.querySelector("#rankTable tbody").innerHTML = "<tr><td colspan='5' class='loading'>📭 暂无排名数据</td></tr>";
                return;
            }

            // 处理排名数据（兼容不同列名）
            const rankData = globalSummaryData
                .filter(row => row.中心仓 || row.站点名称) // 过滤有效数据
                .map(row => {
                    const name = row.中心仓 || row.站点名称 || "未知";
                    const checkCount = row.抽检总量 || row.总单量 || 0;
                    const diffCount = row.客观差异数 || row.差异单量 || 0;
                    const rate = checkCount > 0 ? ((diffCount / checkCount) * 100).toFixed(2) : 0;

                    return {
                        name: name,
                        checkCount: checkCount,
                        diffCount: diffCount,
                        rate: rate
                    };
                })
                .sort((a, b) => b.rate - a.rate) // 按差异率降序排列
                .slice(0, 30); // 取前30名

            // 渲染表格行
            let tableRows = "";
            rankData.forEach((item, index) => {
                tableRows += `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${item.name}</td>
                        <td>${item.rate}%</td>
                        <td>${item.diffCount}</td>
                        <td>${item.checkCount}</td>
                    </tr>
                `;
            });

            // 空数据处理
            if (tableRows === "") {
                tableRows = "<tr><td colspan='5' class='loading'>📭 暂无排名数据</td></tr>";
            }

            document.querySelector("#rankTable tbody").innerHTML = tableRows;
        }

        // ========== 填充筛选器选项 ==========
        function fillFilterOptions() {
            // 填充中心仓选项
            fillSelectOptions("centerWarehouse", getUniqueValues(globalSummaryData, ['中心仓', '站点名称']));
            
            // 填充质检人员选项
            fillSelectOptions("qcPerson", getUniqueValues(globalDiffData, ['质检人员', '操作人', '原操作人名称']));
            
            // 填充问题类型选项
            fillSelectOptions("problemType", getUniqueValues(globalDiffData, ['问题类型']));
            
            // 填充抽检判定类型选项
            fillSelectOptions("judgeType", getUniqueValues(globalDiffData, ['抽检判定类型', '判定类型']));
        }

        // ========== 辅助函数：填充下拉框选项 ==========
        function fillSelectOptions(selectId, options) {
            const select = document.getElementById(selectId);
            // 清空原有选项（保留第一个"全部"选项）
            const allOption = select.options[0];
            select.innerHTML = "";
            select.appendChild(allOption);

            // 添加新选项
            options.forEach(optionText => {
                if (optionText) {
                    const option = document.createElement("option");
                    option.value = optionText;
                    option.textContent = optionText;
                    select.appendChild(option);
                }
            });
        }

        // ========== 辅助函数：获取唯一值 ==========
        function getUniqueValues(data, keys) {
            const values = new Set();
            data.forEach(row => {
                keys.forEach(key => {
                    if (row[key]) values.add(row[key]);
                });
            });
            return Array.from(values).sort();
        }

        // ========== 辅助函数：计算总和（兼容多列名） ==========
        function calculateTotal(data, keys) {
            return data.reduce((sum, row) => {
                let value = 0;
                for (const key of keys) {
                    if (row[key] && !isNaN(Number(row[key]))) {
                        value = Number(row[key]);
                        break;
                    }
                }
                return sum + value;
            }, 0);
        }

        // ========== 重置筛选条件 ==========
        function resetFilter() {
            // 重置所有筛选器
            document.getElementById("centerWarehouse").value = "all";
            document.getElementById("qcKeyword").value = "";
            document.getElementById("qcPerson").value = "all";
            document.getElementById("subjectiveType").value = "all";
            document.getElementById("problemType").value = "all";
            document.getElementById("judgeType").value = "all";

            // 重新渲染数据
            renderAllData();
            alert("🔄 筛选条件已重置为默认状态！");
        }
    </script>
</body>
</html>
