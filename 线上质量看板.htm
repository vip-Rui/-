<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仓储质检数据监察看板</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: #0b1220;
            color: #fff;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }
        .header h1 {
            font-size: 28px;
            color: #00eaff;
            text-shadow: 0 0 10px #00eaff;
        }
        .load-btn {
            position: absolute;
            right: 20px;
            top: 0;
            background: #00eaff;
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .load-btn:hover {
            background: #0099aa;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        .card {
            background: #121a2b;
            border: 1px solid #1e2a3a;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 0 10px rgba(0,234,255,0.1);
        }
        .card h3 {
            color: #00eaff;
            margin-bottom: 10px;
            font-size: 16px;
        }
        .number {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        th, td {
            border: 1px solid #1e2a3a;
            padding: 6px;
            text-align: center;
        }
        th {
            background: #1a2435;
            color: #00eaff;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>仓储质检数据监察看板</h1>
        <button class="load-btn" onclick="loadRemoteData()">加载数据</button>
    </div>

    <div class="grid">
        <div class="card">
            <h3>总质检单量</h3>
            <div id="totalCount" class="number">0</div>
        </div>
        <div class="card">
            <h3>差异单量</h3>
            <div id="diffCount" class="number">0</div>
        </div>
        <div class="card">
            <h3>差异率</h3>
            <div id="diffRate" class="number">0%</div>
        </div>

        <div class="card" style="grid-column: span 3;">
            <h3>站点差异排名 TOP10</h3>
            <div style="height:300px;">
                <canvas id="rankChart"></canvas>
            </div>
        </div>

        <div class="card" style="grid-column: span 3;">
            <h3>差异明细</h3>
            <div id="diffTable"></div>
        </div>
    </div>

    <script>
        // 远程文件地址（你的 GitHub 仓库）
        const SUMMARY_URL = "https://raw.githubusercontent.com/vip-rui/-/main/周汇总表.xlsx";
        const DIFF_URL = "https://raw.githubusercontent.com/vip-rui/-/main/差异明细表.xlsx";

        let rankChart = null;

        // 点击按钮：自动加载你上传的 Excel
        async function loadRemoteData() {
            alert("正在加载最新数据，请稍候...");
            
            try {
                // 下载并解析汇总表
                const summaryRes = await fetch(SUMMARY_URL);
                const summaryBlob = await summaryRes.blob();
                const summaryWorkbook = await readExcelBlob(summaryBlob);
                
                // 下载并解析差异表
                const diffRes = await fetch(DIFF_URL);
                const diffBlob = await diffRes.blob();
                const diffWorkbook = await readExcelBlob(diffBlob);

                // 渲染数据
                renderData(summaryWorkbook, diffWorkbook);
                alert("数据加载完成！");
            } catch (e) {
                alert("加载失败：" + e.message);
            }
        }

        // 读取 Excel
        function readExcelBlob(blob) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    resolve(workbook);
                };
                reader.readAsArrayBuffer(blob);
            });
        }

        // 渲染看板
        function renderData(summaryWB, diffWB) {
            const summarySheet = summaryWB.Sheets[summaryWB.SheetNames[0]];
            const summaryData = XLSX.utils.sheet_to_json(summarySheet);
            
            const diffSheet = diffWB.Sheets[diffWB.SheetNames[0]];
            const diffData = XLSX.utils.sheet_to_json(diffSheet);

            // 计算核心数字
            const total = summaryData.reduce((sum, row) => sum + (row.总单量 || 0), 0);
            const diffTotal = diffData.length;
            const rate = total > 0 ? ((diffTotal / total) * 100).toFixed(2) : 0;

            document.getElementById("totalCount").innerText = total;
            document.getElementById("diffCount").innerText = diffTotal;
            document.getElementById("diffRate").innerText = rate + "%";

            // 排名图表
            renderRankChart(summaryData);
            
            // 差异表格
            renderDiffTable(diffData);
        }

        // 排名图
        function renderRankChart(data) {
            const sorted = [...data].sort((a, b) => (b.差异单量 || 0) - (a.差异单量 || 0)).slice(0, 10);
            const labels = sorted.map(i => i.站点名称 || "未知");
            const values = sorted.map(i => i.差异单量 || 0);

            const ctx = document.getElementById("rankChart").getContext("2d");
            if (rankChart) rankChart.destroy();
            
            rankChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '差异单量',
                        data: values,
                        backgroundColor: '#00eaff',
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } }
                }
            });
        }

        // 差异表格
        function renderDiffTable(data) {
            if (data.length === 0) {
                document.getElementById("diffTable").innerHTML = "<p>暂无差异数据</p>";
                return;
            }

            const headers = Object.keys(data[0]);
            let html = "<table><tr>";
            headers.forEach(h => html += `<th>${h}</th>`);
            html += "</tr>";
            
            data.slice(0, 20).forEach(row => {
                html += "<tr>";
                headers.forEach(h => html += `<td>${row[h] || ''}</td>`);
                html += "</tr>";
            });
            
            html += "</table>";
            document.getElementById("diffTable").innerHTML = html;
        }
    </script>
</body>
</html>
