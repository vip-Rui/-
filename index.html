<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>数据监察看板 · 客观执行差异率</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js">
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-body: #f0f2f6; --bg-card: #ffffff; --text-primary: #1e293b; --text-secondary: #475569;
            --border-color: #e2e8f0; --kpi-bg: #f8fafc; --header-bg: #ffffff; --btn-bg: #3b82f6;
            --btn-hover: #2563eb; --shadow: 0 4px 12px rgba(0,0,0,0.05); --table-header-bg: #f1f5f9;
            --table-hover: #fef9e3; --high-diff-text: #b91c1c; --chart-text: #1e293b;
            --scrollbar-track: #e2e8f0; --scrollbar-thumb: #94a3b8; --modal-overlay: rgba(0,0,0,0.5);
            --filter-bar-bg: #ffffff; --filter-input-bg: #f8fafc; --filter-hover-bg: #f1f5f9;
            --reset-btn-bg: #f1f5f9; --reset-btn-hover: #e2e8f0; --reset-btn-text: #475569;
            --indicator-bg: #3b82f6;
        }
        body.dark {
            --bg-body: #0f172a; --bg-card: #1e293b; --text-primary: #f1f5f9; --text-secondary: #94a3b8;
            --border-color: #334155; --kpi-bg: #334155; --header-bg: #1e293b; --btn-bg: #2563eb;
            --btn-hover: #3b82f6; --shadow: 0 4px 12px rgba(0,0,0,0.3); --table-header-bg: #334155;
            --table-hover: #2d3748; --high-diff-text: #fecaca; --chart-text: #f1f5f9;
            --scrollbar-track: #1e293b; --scrollbar-thumb: #475569; --modal-overlay: rgba(0,0,0,0.7);
            --filter-bar-bg: #1e293b; --filter-input-bg: #1e293b; --filter-hover-bg: #334155;
            --reset-btn-bg: #334155; --reset-btn-hover: #475569; --reset-btn-text: #cbd5e1;
        }
        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--bg-body); padding: 20px 24px; color: var(--text-primary);
            transition: background 0.3s, color 0.2s; min-height: 100vh;
        }
        .password-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 9999; display: flex;
            justify-content: center; align-items: center; backdrop-filter: blur(8px);
        }
        .password-box {
            background: var(--bg-card); border-radius: 24px; padding: 32px; width: 350px;
            text-align: center; box-shadow: 0 20px 35px rgba(0,0,0,0.3); color: var(--text-primary);
        }
        .password-box h3 { margin-bottom: 20px; font-size: 1.5rem; }
        .password-box input {
            width: 100%; padding: 12px; margin: 15px 0; border-radius: 12px;
            border: 1px solid var(--border-color); background: var(--bg-card);
            color: var(--text-primary); font-size: 16px; outline: none;
        }
        .password-box input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
        .password-box button {
            width: 100%; padding: 12px; background: var(--btn-bg); color: white;
            border: none; border-radius: 12px; font-size: 16px; cursor: pointer;
            transition: 0.2s; font-weight: 600;
        }
        .password-box button:hover { background: var(--btn-hover); transform: translateY(-1px); }
        .error-msg { color: #ef4444; margin-top: 10px; font-size: 14px; min-height: 20px; }
        .main-content { display: none; }
        .container { max-width: 1400px; margin: 0 auto; }
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--header-bg); border-radius: 16px; padding: 10px 20px;
            margin-bottom: 14px; box-shadow: var(--shadow); flex-wrap: wrap; gap: 10px;
        }
        .title-area h2 { font-size: 1.4rem; }
        .theme-btn, .load-data-btn {
            background: var(--kpi-bg); border: 1px solid var(--border-color);
            border-radius: 28px; padding: 7px 14px; cursor: pointer; font-size: 13px;
            display: inline-flex; align-items: center; gap: 6px; transition: 0.2s;
            color: var(--text-primary); white-space: nowrap;
        }
        .upload-btn {
            background: var(--btn-bg); color: white; border: none; border-radius: 28px;
            padding: 7px 16px; font-size: 13px; font-weight: 500; cursor: pointer;
            display: inline-flex; align-items: center; gap: 6px; transition: 0.2s;
        }
        .filter-bar {
            background: var(--filter-bar-bg); border-radius: 14px; padding: 12px 18px;
            margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            display: flex; flex-wrap: wrap; align-items: flex-end; gap: 14px 16px;
            border: 1px solid var(--border-color); position: sticky; top: 8px; z-index: 50;
        }
        .filter-group { display: flex; flex-direction: column; gap: 4px; min-width: 90px; flex: 1 1 130px; max-width: 200px; }
        .filter-group label { font-weight: 600; font-size: 12px; color: var(--text-secondary); }
        .filter-group select, .filter-group input {
            width: 100%; padding: 7px 10px; border-radius: 8px; border: 1px solid var(--border-color);
            background: var(--filter-input-bg); color: var(--text-primary); font-size: 12px;
            height: 34px; outline: none;
        }
        .filter-bar .reset-filter-btn {
            flex: 0 0 auto; padding: 8px 18px; background: var(--reset-btn-bg);
            color: var(--reset-btn-text); border: 1px solid var(--border-color);
            border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer;
            height: 34px; align-self: flex-end;
        }
        .card {
            background: var(--bg-card); border-radius: 16px; box-shadow: var(--shadow);
            padding: 18px 22px; margin-bottom: 20px;
        }
        .card-title {
            font-size: 17px; font-weight: 600; margin-bottom: 16px;
            border-left: 4px solid #3b82f6; padding-left: 12px;
        }
        .stats-grid { display: flex; gap: 10px; flex-wrap: wrap; }
        .stats-item {
            flex: 1; min-width: 110px; background: var(--kpi-bg); border-radius: 16px;
            padding: 12px 10px; text-align: center; border: 1px solid var(--border-color);
        }
        .stats-number { font-size: 26px; font-weight: 800; color: #3b82f6; }
        .stats-label { font-size: 11px; color: var(--text-secondary); margin-top: 6px; }
        .chart-row { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 14px; }
        .chart-box { flex: 1; min-width: 260px; height: 340px; }
        .obj-rank-wrapper { flex: 1.1; min-width: 260px; }
        .obj-rank-scroll { max-height: 400px; overflow-y: auto; border-radius: 12px; border: 1px solid var(--border-color); }
        .obj-rank-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .obj-rank-table th, .obj-rank-table td { border: 1px solid var(--border-color); padding: 8px 7px; text-align: center; }
        .obj-rank-table th { background: var(--table-header-bg); position: sticky; top: 0; }
        .rank-table, .detail-table, .ranking-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .rank-table th, .rank-table td, .detail-table th, .detail-table td, .ranking-table th, .ranking-table td {
            border: 1px solid var(--border-color); padding: 5px 8px; text-align: center;
        }
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--modal-overlay); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--bg-card); border-radius: 20px; width: 90%; max-width: 1200px;
            max-height: 80vh; overflow: auto; padding: 20px;
        }
        .footer-note { font-size: 11px; color: var(--text-secondary); text-align: center; margin-top: 16px; }
    </style>
</head>
<body>
<div id="passwordOverlay" class="password-overlay">
    <div class="password-box">
        <h3>🔐 访问验证</h3>
        <p>请输入访问密码</p>
        <input type="password" id="passwordInput" placeholder="密码" autofocus>
        <button id="submitPassword">确认</button>
        <div id="passwordError" class="error-msg"></div>
    </div>
</div>

<div id="mainContent" class="main-content">
<div class="container">
    <div class="top-bar">
        <div class="title-area"><h2>📋 数据监察看板</h2></div>
        <div class="right-buttons">
            <button id="themeToggleBtn" class="theme-btn">🌙 夜间模式</button>
            <button id="loadOnlineDataBtn" class="load-data-btn">📂 加载数据</button>
            <button id="uploadCombinedBtn" class="upload-btn">📁 上传文件<span class="btn-sub">(手动)</span></button>
        </div>
        <input type="file" id="combinedFileInput" class="file-input-hidden" accept=".xlsx, .xls" multiple>
    </div>

    <div class="filter-bar" id="filterBar">
        <div class="filter-group"><label>🏚️ 中心仓</label><select id="warehouseFilter"><option value="__ALL__">全部中心仓</option></select></div>
        <div class="filter-group"><label>🔎 质检人员关键字</label><input type="text" id="personKeyword" placeholder="姓名关键字"></div>
        <div class="filter-group"><label>👤 质检人员</label><select id="personFilter"><option value="__ALL__">全部质检人员</option></select></div>
        <div class="filter-group"><label>📌 主客观项</label><select id="subjObjFilter"><option value="ALL">全部</option><option value="OBJ">客观</option><option value="SUBJ">主观</option></select></div>
        <div class="filter-group"><label>⚠️ 问题类型</label><select id="issueTypeFilter"><option value="__ALL__">全部问题类型</option></select></div>
        <div class="filter-group"><label>🔖 抽检判定类型</label><select id="judgedIssueTypeFilter"><option value="__ALL__">全部</option></select></div>
        <button id="resetFilter" class="reset-filter-btn">↻ 重置筛选</button>
    </div>

    <div class="card"><div class="card-title">📈 抽检指标详情</div><div class="stats-grid" id="statsArea"></div><div class="note-text">※ 数据基于周汇总表和差异明细表（已自动剔除“个体评估/工程师”）</div></div>
    <div class="card">
        <div class="card-title">📈 可视化洞察 · 中心仓客观执行差异率排行</div>
        <div class="chart-row">
            <div class="obj-rank-wrapper"><div class="obj-rank-scroll" id="objRankScroll"><table class="obj-rank-table"><thead><tr><th>排名</th><th>站点名称</th><th>客观执行抽检差异率</th></tr></thead><tbody id="objRankBody"></tbody></table></div><div class="reset-hint" id="resetViewHint">✨ 点击此处 重置筛选</div></div>
            <div id="barChart" class="chart-box"></div>
            <div class="right-chart-container">
                <div id="pieChartWrapper"><div id="pieChart" style="width:100%; height:340px;"></div></div>
                <div id="personPieWrapper" style="display:none;"><div id="personPieChart" style="width:100%; height:340px;"></div><div class="back-to-chart" id="backToChartBtn">← 返回图表</div></div>
            </div>
        </div>
    </div>
    <!-- 其余卡片结构简略，完整JS将动态填充 -->
</div>
</div>

<script>
    (function() {
        const PASSWORD = 'zz1111';
        const overlay = document.getElementById('passwordOverlay');
        const main = document.getElementById('mainContent');
        document.getElementById('submitPassword').addEventListener('click', () => {
            if (document.getElementById('passwordInput').value === PASSWORD) {
                overlay.style.display = 'none';
                main.style.display = 'block';
                sessionStorage.setItem('auth', '1');
                initDashboard();
            } else {
                document.getElementById('passwordError').innerText = '密码错误';
            }
        });
        if (sessionStorage.getItem('auth') === '1') {
            overlay.style.display = 'none';
            main.style.display = 'block';
        }
    })();

    function initDashboard() {
        // 样式与之前的看板一致，重点修改数据加载逻辑以解决“Excel无数据”问题
        let diffData = [], summaryData = [];
        let warehouseSet = new Set(), allPersonSet = new Set(), allIssueTypes = new Set(), allJudgedIssueTypes = new Set();
        let barChart, globalPieChart, personPieChart;
        let currentFilteredDiff = [];
        const warehouseFilter = document.getElementById('warehouseFilter');
        const personKeyword = document.getElementById('personKeyword');
        const personFilter = document.getElementById('personFilter');
        const subjObjFilter = document.getElementById('subjObjFilter');
        const issueTypeFilter = document.getElementById('issueTypeFilter');
        const judgedIssueTypeFilter = document.getElementById('judgedIssueTypeFilter');

        function isObjective(c) { return c && c.includes('客观') && !c.includes('主观'); }
        function isSubjective(c) { return c && c.includes('主观'); }
        function isExecutionIssue(t) { return t === '执行问题'; }

        // --- 核心：修复加载逻辑 ---
        async function loadOnlineData() {
            const btn = document.getElementById('loadOnlineDataBtn');
            const orig = btn.innerText;
            btn.innerText = '⏳ 加载中...';
            btn.disabled = true;
            try {
                // 添加时间戳防止缓存
                const timestamp = Date.now();
                const [sumRes, diffRes] = await Promise.all([
                    fetch(`周汇总表.xlsx?v=${timestamp}`),
                    fetch(`差异明细表.xlsx?v=${timestamp}`)
                ]);
                if (!sumRes.ok || !diffRes.ok) throw new Error('文件请求失败，请检查文件是否存在于仓库根目录');

                const sumBuffer = await sumRes.arrayBuffer();
                const diffBuffer = await diffRes.arrayBuffer();
                const sumWB = XLSX.read(new Uint8Array(sumBuffer), { type: 'array' });
                const diffWB = XLSX.read(new Uint8Array(diffBuffer), { type: 'array' });

                const sumSheet = sumWB.Sheets[sumWB.SheetNames[0]];
                const diffSheet = diffWB.Sheets[diffWB.SheetNames[0]];

                const sumRows = XLSX.utils.sheet_to_json(sumSheet);
                const diffRows = XLSX.utils.sheet_to_json(diffSheet);

                console.log('周汇总表解析行数:', sumRows.length);
                console.log('差异明细表解析行数:', diffRows.length);

                if (!sumRows.length && !diffRows.length) {
                    throw new Error('两个Excel都没有数据行，请检查文件内容是否正确（第一行应为表头，后续为数据）');
                } else if (!sumRows.length) {
                    throw new Error('周汇总表无数据，请检查该文件');
                } else if (!diffRows.length) {
                    throw new Error('差异明细表无数据，请检查该文件');
                }

                parseAndSetData(sumRows, diffRows);
                updateAllFilters();
                resetAllFilters();
                fullRefresh();
                alert('✅ 数据加载成功！');
            } catch (err) {
                console.error(err);
                alert('❌ 加载失败：' + err.message + '\n\n请按F12打开控制台查看详细信息');
            } finally {
                btn.innerText = orig;
                btn.disabled = false;
            }
        }

        function parseDiffRow(row) {
            const strategy = (row['策略类别'] || '').trim();
            if (strategy === '个体评估/工程师') return null;
            const warehouse = (row['站点名称'] || row['站点'] || row['仓库'] || '').trim();
            const person = (row['原操作人名称'] || row['原操作人'] || row['质检人员'] || '').trim();
            if (!warehouse || !person) return null;
            return {
                warehouse, person,
                qaInspector: (row['新操作人名称'] || row['QA抽检人'] || '').trim(),
                category: (row['主客观问题分类'] || row['主客观分类'] || '').trim(),
                date: row['日期'] || row['抽检日期'] || '',
                level1: row['一级项名称'] || row['一级项'] || '',
                level2: row['二级项名称'] || row['二级项'] || '',
                level3: row['新三级项名称'] || row['三级项名称'] || row['三级项'] || '',
                issueType: (row['问题类型'] || '').trim(),
                judgedIssueType: (row['抽检判定的问题类型'] || row['判定类型'] || '').trim(),
                model: row['型号名称'] || row['型号'] || '',
                code: (row['质检码'] || row['编码'] || '').trim()
            };
        }

        function parseAndSetData(sumRows, diffRows) {
            warehouseSet.clear(); allPersonSet.clear(); allIssueTypes.clear(); allJudgedIssueTypes.clear();
            summaryData = sumRows.map(r => ({
                siteName: (r['站点名称'] || r['站点'] || r['仓库'] || '').trim(),
                totalChecks: parseFloat(r['总抽检量'] ?? r['大盘抽检设备数量'] ?? 0)
            })).filter(s => s.siteName);
            diffData = [];
            for (let row of diffRows) {
                const p = parseDiffRow(row);
                if (p) {
                    diffData.push(p);
                    warehouseSet.add(p.warehouse);
                    allPersonSet.add(p.person);
                    if (p.issueType) allIssueTypes.add(p.issueType);
                    if (p.judgedIssueType) allJudgedIssueTypes.add(p.judgedIssueType);
                }
            }
            if (!summaryData.length || !diffData.length) throw new Error('解析后无有效数据，请确认列名包含“站点名称”、“总抽检量”等字段');
        }

        function updateAllFilters() {
            warehouseFilter.innerHTML = ['<option value="__ALL__">全部中心仓</option>', ...Array.from(warehouseSet).sort().map(w => `<option>${w}</option>`)].join('');
            personFilter.innerHTML = ['<option value="__ALL__">全部质检人员</option>', ...Array.from(allPersonSet).sort().map(p => `<option>${p}</option>`)].join('');
            issueTypeFilter.innerHTML = ['<option value="__ALL__">全部问题类型</option>', ...Array.from(allIssueTypes).sort().map(t => `<option>${t}</option>`)].join('');
            judgedIssueTypeFilter.innerHTML = ['<option value="__ALL__">全部</option>', ...Array.from(allJudgedIssueTypes).sort().map(t => `<option>${t}</option>`)].join('');
        }

        function resetAllFilters() {
            warehouseFilter.value = '__ALL__'; personKeyword.value = ''; personFilter.value = '__ALL__';
            subjObjFilter.value = 'ALL'; issueTypeFilter.value = '__ALL__'; judgedIssueTypeFilter.value = '__ALL__';
            fullRefresh();
        }

        function filterDiffData(data) {
            let f = data;
            if (warehouseFilter.value !== '__ALL__') f = f.filter(d => d.warehouse === warehouseFilter.value);
            if (personFilter.value !== '__ALL__') f = f.filter(d => d.person === personFilter.value);
            if (subjObjFilter.value === 'OBJ') f = f.filter(d => isObjective(d.category));
            else if (subjObjFilter.value === 'SUBJ') f = f.filter(d => isSubjective(d.category));
            if (issueTypeFilter.value !== '__ALL__') f = f.filter(d => d.issueType === issueTypeFilter.value);
            if (judgedIssueTypeFilter.value !== '__ALL__') f = f.filter(d => d.judgedIssueType === judgedIssueTypeFilter.value);
            return f;
        }

        function fullRefresh() {
            currentFilteredDiff = filterDiffData(diffData);
            // 更新各种表格和图表...
            updateStatsBoard();
            renderObjRanking();
            refreshCharts();
            renderDetailTable();
        }

        // 此处省略其他辅助函数，完整代码保持与之前一致，但重点已在loadOnlineData修复
        document.getElementById('loadOnlineDataBtn').addEventListener('click', loadOnlineData);
        document.getElementById('resetFilter').addEventListener('click', resetAllFilters);
        // 初始化自动加载
        loadOnlineData();
    }
</script>
</body>
</html>
